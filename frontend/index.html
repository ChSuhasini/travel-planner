<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WellyPlan — Wellington Trip Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0d1117;
      --fog: #1c2333;
      --teal: #00b4d8;
      --teal2: #0077b6;
      --gold: #cca84b;
      --white: #ffffff;
      --muted: #8899aa;
      --border: rgba(255,255,255,0.08);
      --card-bg: rgba(16,24,40,0.82);
    }

    html, body { height: 100%; font-family: 'Jost', sans-serif; color: var(--white); overflow-x: hidden; }

    /* ── ANIMATED BACKGROUND ── */
    .bg { position: fixed; inset: 0; z-index: 0; background: #060d18; overflow: hidden; }

    .blob {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.35;
      animation: drift linear infinite;
    }
    .blob1 { width:600px;height:600px;background:#0077b6;top:-200px;left:-100px;animation-duration:22s; }
    .blob2 { width:500px;height:500px;background:#00b4d8;top:30%;right:-150px;animation-duration:28s;animation-delay:-10s; }
    .blob3 { width:400px;height:400px;background:#023e8a;bottom:-100px;left:30%;animation-duration:18s;animation-delay:-5s; }
    .blob4 { width:350px;height:350px;background:#0096c7;top:60%;left:-50px;animation-duration:24s;animation-delay:-15s; }

    @keyframes drift {
      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(40px,-60px) scale(1.05); }
      66%  { transform: translate(-30px,40px) scale(0.95); }
      100% { transform: translate(0,0) scale(1); }
    }

    .grid-overlay {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,180,216,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,180,216,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridShift 20s linear infinite;
    }
    @keyframes gridShift { from{background-position:0 0} to{background-position:60px 60px} }

    .particles { position: absolute; inset: 0; pointer-events: none; }
    .particle {
      position: absolute; width:2px; height:2px;
      background: var(--teal); border-radius: 50%;
      opacity: 0; animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { opacity:0; transform:translateY(0) scale(0); }
      10%  { opacity:0.6; transform:translateY(-20px) scale(1); }
      90%  { opacity:0.3; }
      100% { opacity:0; transform:translateY(-300px) scale(0.5); }
    }

    /* ── LAYOUT ── */
    .page { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; }

    header {
      padding: 1.5rem 2.5rem;
      display: flex; align-items: center;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      background: rgba(6,13,24,0.5);
    }
    .logo { display:flex; align-items:center; gap:0.8rem; }
    .logo-icon {
      width:38px; height:38px;
      border: 1.5px solid var(--teal); border-radius:8px;
      display:flex; align-items:center; justify-content:center;
      font-size:1.1rem;
    }
    .logo h1 { font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:600; }
    .logo h1 span { color:var(--teal); }
    .logo p { font-size:0.72rem; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
    .header-right { margin-left:auto; display:flex; align-items:center; gap:0.8rem; }
    .status-dot { width:7px;height:7px;background:#22c55e;border-radius:50%;box-shadow:0 0 6px #22c55e;animation:pulse 2s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .status-text { font-size:0.75rem; color:var(--muted); }

    .main {
      flex:1; display:grid; grid-template-columns:360px 1fr;
      gap:2rem; padding:2rem 2.5rem;
      align-items:start; max-width:1200px; margin:0 auto; width:100%;
    }

    /* FORM */
    .form-card {
      position:sticky; top:1.5rem;
      background:var(--card-bg); border:1px solid var(--border);
      border-radius:16px; backdrop-filter:blur(20px); overflow:hidden;
    }
    .form-card-header {
      padding:1.2rem 1.5rem; border-bottom:1px solid var(--border);
      background:linear-gradient(135deg,rgba(0,119,182,0.2),rgba(0,180,216,0.1));
    }
    .form-card-header h2 { font-family:'Cormorant Garamond',serif; font-size:1.2rem; font-weight:600; }
    .form-card-header p { font-size:0.78rem; color:var(--muted); margin-top:0.2rem; }

    form { padding:1.4rem; display:flex; flex-direction:column; gap:1.1rem; }

    .field label {
      display:block; font-size:0.7rem; font-weight:500;
      color:var(--teal); text-transform:uppercase; letter-spacing:1px; margin-bottom:0.4rem;
    }
    .field input[type="number"], .field select {
      width:100%; padding:0.6rem 0.9rem;
      border:1px solid var(--border); border-radius:8px;
      font-family:'Jost',sans-serif; font-size:0.88rem;
      background:rgba(255,255,255,0.05); color:var(--white); outline:none;
      transition:border-color 0.2s, background 0.2s;
    }
    .field input[type="number"]:focus, .field select:focus {
      border-color:var(--teal); background:rgba(0,180,216,0.07);
    }
    .field select option { background:#1c2333; }

    .interests-grid { display:flex; flex-direction:column; gap:0.45rem; }
    .interest-item {
      display:flex; align-items:center; justify-content:space-between;
      background:rgba(255,255,255,0.03); border:1px solid var(--border);
      border-radius:8px; padding:0.4rem 0.8rem; font-size:0.82rem; gap:0.5rem;
    }
    .interest-label { display:flex; align-items:center; gap:0.4rem; min-width:90px; }
    .interest-item input[type="range"] { flex:1; accent-color:var(--teal); }
    .interest-val { font-size:0.72rem; color:var(--teal); min-width:12px; text-align:right; }

    .constraints-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.4rem; }
    .constraint-item {
      display:flex; align-items:center; gap:0.5rem;
      font-size:0.8rem; cursor:pointer; padding:0.35rem 0.5rem;
      border-radius:6px; border:1px solid transparent; transition:border-color 0.2s;
    }
    .constraint-item:hover { border-color:var(--border); }
    .constraint-item input[type="checkbox"] { accent-color:var(--teal); }

    .divider { height:1px; background:var(--border); margin:0.2rem 0; }

    .btn {
      background:linear-gradient(135deg,var(--teal2),var(--teal));
      color:white; border:none; padding:0.9rem; border-radius:10px;
      font-family:'Jost',sans-serif; font-size:0.9rem; font-weight:500;
      cursor:pointer; letter-spacing:0.5px; transition:opacity 0.2s,transform 0.1s;
    }
    .btn:hover { opacity:0.9; transform:translateY(-1px); }
    .btn:active { transform:translateY(0); }
    .btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

    /* RESULTS */
    .results { display:flex; flex-direction:column; gap:1.2rem; }

    .empty-state {
      background:var(--card-bg); border:1px solid var(--border);
      border-radius:16px; padding:4rem 2rem; text-align:center; backdrop-filter:blur(20px);
    }
    .empty-icon { font-size:3rem; margin-bottom:1rem; display:block; animation:floatIcon 3s ease-in-out infinite; }
    @keyframes floatIcon { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .empty-state h3 { font-family:'Cormorant Garamond',serif; font-size:1.4rem; margin-bottom:0.5rem; }
    .empty-state p { font-size:0.82rem; color:var(--muted); }

    .trip-meta {
      background:linear-gradient(135deg,rgba(0,119,182,0.3),rgba(0,180,216,0.15));
      border:1px solid rgba(0,180,216,0.2); border-radius:16px;
      padding:1.5rem; display:flex; gap:2rem; flex-wrap:wrap; backdrop-filter:blur(20px);
    }
    .meta-item { display:flex; flex-direction:column; gap:0.2rem; }
    .meta-item .label { font-size:0.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
    .meta-item .value { font-size:1.1rem; font-weight:500; font-family:'Cormorant Garamond',serif; }
    .trip-id-badge {
      margin-left:auto; align-self:center;
      background:rgba(0,180,216,0.15); border:1px solid rgba(0,180,216,0.3);
      color:var(--teal); padding:0.3rem 0.9rem; border-radius:20px; font-size:0.75rem;
    }
    .warning-bar {
      background:rgba(204,168,75,0.15); border:1px solid rgba(204,168,75,0.3);
      color:var(--gold); border-radius:8px; padding:0.7rem 1rem; font-size:0.82rem;
    }

    .day-card {
      background:var(--card-bg); border:1px solid var(--border);
      border-radius:16px; overflow:hidden; backdrop-filter:blur(20px);
      animation:fadeUp 0.4s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

    .day-header {
      padding:1rem 1.3rem; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
      background:rgba(0,180,216,0.05);
    }
    .day-header h3 { font-family:'Cormorant Garamond',serif; font-size:1.1rem; font-weight:600; }
    .day-header .day-stats { font-size:0.72rem; color:var(--muted); }

    .slots { padding:1rem 1.2rem; display:flex; flex-direction:column; gap:0.7rem; }

    .slot {
      display:flex; align-items:flex-start; gap:0.9rem;
      padding:0.9rem; border-radius:10px;
      border:1px solid var(--border); background:rgba(255,255,255,0.02);
      position:relative; transition:border-color 0.2s,background 0.2s;
    }
    .slot:hover { border-color:rgba(0,180,216,0.2); background:rgba(0,180,216,0.03); }
    .slot.locked { border-color:rgba(204,168,75,0.3); background:rgba(204,168,75,0.04); }

    .slot-time {
      font-size:0.68rem; font-weight:500; text-transform:uppercase;
      letter-spacing:1px; color:var(--teal); min-width:72px; padding-top:0.15rem;
    }
    .slot-content { flex:1; }
    .slot-name { font-size:0.92rem; font-weight:500; margin-bottom:0.25rem; }
    .slot-detail { font-size:0.74rem; color:var(--muted); margin-bottom:0.35rem; }
    .slot-tags { display:flex; gap:0.3rem; flex-wrap:wrap; }
    .tag {
      background:rgba(0,180,216,0.12); border:1px solid rgba(0,180,216,0.2);
      color:var(--teal); padding:0.1rem 0.5rem; border-radius:20px; font-size:0.65rem;
    }
    .lock-badge { position:absolute; top:0.6rem; right:0.6rem; font-size:0.7rem; color:var(--gold); }

    .slot-actions { display:flex; flex-direction:column; gap:0.3rem; }
    .action-btn {
      background:rgba(255,255,255,0.04); border:1px solid var(--border);
      border-radius:6px; padding:0.28rem 0.65rem; font-size:0.7rem;
      cursor:pointer; font-family:'Jost',sans-serif; color:var(--white);
      transition:all 0.15s; white-space:nowrap; letter-spacing:0.3px;
    }
    .action-btn:hover { background:rgba(0,180,216,0.15); border-color:rgba(0,180,216,0.4); color:var(--teal); }
    .action-btn.gold { border-color:rgba(204,168,75,0.3); color:var(--gold); }
    .action-btn.gold:hover { background:rgba(204,168,75,0.12); }

    .day-footer { padding:0.7rem 1.2rem; border-top:1px solid var(--border); display:flex; gap:0.5rem; }

    .loader { display:none; text-align:center; padding:3rem; color:var(--muted); }
    .loader.active { display:block; }
    .spinner {
      width:36px; height:36px; border:2px solid var(--border);
      border-top-color:var(--teal); border-radius:50%;
      animation:spin 0.7s linear infinite; margin:0 auto 1rem;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    .error-bar {
      background:rgba(224,92,92,0.12); border:1px solid rgba(224,92,92,0.3);
      color:#f87171; border-radius:10px; padding:1rem; font-size:0.85rem; display:none;
    }
    .error-bar.active { display:block; }

    @media (max-width:768px) {
      .main { grid-template-columns:1fr; padding:1.2rem; }
      .form-card { position:static; }
      header { padding:1rem 1.2rem; }
    }
  </style>
</head>
<body>

<div class="bg">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
  <div class="blob blob4"></div>
  <div class="grid-overlay"></div>
  <div class="particles" id="particles"></div>
</div>

<div class="page">
  <header>
    <div class="logo">
      <div class="logo-icon">🗺</div>
      <div>
        <h1>Welly<span>Plan</span></h1>
        <p>Wellington Trip Planner</p>
      </div>
    </div>
    <div class="header-right">
      <div class="status-dot"></div>
      <span class="status-text">API Online</span>
    </div>
  </header>

  <div class="main">
    <!-- FORM -->
    <div class="form-card">
      <div class="form-card-header">
        <h2>Plan Your Wellington Trip</h2>
        <p>Personalised itinerary in seconds</p>
      </div>
      <form id="tripForm">
        <div class="field">
          <label>Number of Days</label>
          <input type="number" id="days" min="1" max="5" value="2"/>
        </div>
        <div class="field">
          <label>Budget (NZD $)</label>
          <input type="number" id="budget" min="0" max="10000" value="500"/>
        </div>
        <div class="field">
          <label>Travel Pace</label>
          <select id="pace">
            <option value="relaxed">🌿 Relaxed — 7 hrs/day</option>
            <option value="balanced" selected>⚖️ Balanced — 10 hrs/day</option>
            <option value="packed">⚡ Packed — 13 hrs/day</option>
          </select>
        </div>
        <div class="divider"></div>
        <div class="field">
          <label>Interests</label>
          <div class="interests-grid">
            <div class="interest-item"><span class="interest-label">🍜 Food</span><input type="range" min="1" max="5" value="3" id="food" oninput="this.nextElementSibling.textContent=this.value"/><span class="interest-val">3</span></div>
            <div class="interest-item"><span class="interest-label">🌿 Nature</span><input type="range" min="1" max="5" value="3" id="nature" oninput="this.nextElementSibling.textContent=this.value"/><span class="interest-val">3</span></div>
            <div class="interest-item"><span class="interest-label">🏛 Culture</span><input type="range" min="1" max="5" value="3" id="culture" oninput="this.nextElementSibling.textContent=this.value"/><span class="interest-val">3</span></div>
            <div class="interest-item"><span class="interest-label">🌄 Views</span><input type="range" min="1" max="5" value="3" id="views" oninput="this.nextElementSibling.textContent=this.value"/><span class="interest-val">3</span></div>
            <div class="interest-item"><span class="interest-label">🧗 Adventure</span><input type="range" min="1" max="5" value="3" id="adventure" oninput="this.nextElementSibling.textContent=this.value"/><span class="interest-val">3</span></div>
            <div class="interest-item"><span class="interest-label">🛍 Shopping</span><input type="range" min="1" max="5" value="1" id="shopping" oninput="this.nextElementSibling.textContent=this.value"/><span class="interest-val">1</span></div>
          </div>
        </div>
        <div class="divider"></div>
        <div class="field">
          <label>Constraints</label>
          <div class="constraints-grid">
            <label class="constraint-item"><input type="checkbox" id="kid_friendly"/> 👶 Kid Friendly</label>
            <label class="constraint-item"><input type="checkbox" id="indoor_only"/> 🏠 Indoor Only</label>
            <label class="constraint-item"><input type="checkbox" id="accessibility_friendly"/> ♿ Accessible</label>
            <label class="constraint-item"><input type="checkbox" id="avoid_high_walking"/> 🦶 Low Walking</label>
          </div>
        </div>
        <button type="submit" class="btn" id="generateBtn">✦ Generate Itinerary</button>
      </form>
    </div>

    <!-- RESULTS -->
    <div class="results" id="results">
      <div class="empty-state">
        <span class="empty-icon">🗺️</span>
        <h3>Your itinerary will appear here</h3>
        <p>Fill in your preferences and click Generate</p>
      </div>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:8000';
  let currentTripId = null;

  // floating particles
  const pc = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${6+Math.random()*10}s;animation-delay:${Math.random()*10}s;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;`;
    pc.appendChild(p);
  }

  document.getElementById('tripForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('generateBtn');
    btn.disabled = true; btn.textContent = '⟳ Generating...';
    document.getElementById('results').innerHTML = '<div class="loader active"><div class="spinner"></div><p>Building your itinerary...</p></div>';

    const body = {
      days: parseInt(document.getElementById('days').value),
      budget_nzd: parseInt(document.getElementById('budget').value),
      pace: document.getElementById('pace').value,
      interests: {
        food: parseInt(document.getElementById('food').value),
        nature: parseInt(document.getElementById('nature').value),
        culture: parseInt(document.getElementById('culture').value),
        views: parseInt(document.getElementById('views').value),
        adventure: parseInt(document.getElementById('adventure').value),
        shopping: parseInt(document.getElementById('shopping').value),
      },
      constraints: {
        kid_friendly: document.getElementById('kid_friendly').checked,
        indoor_only: document.getElementById('indoor_only').checked,
        accessibility_friendly: document.getElementById('accessibility_friendly').checked,
        avoid_high_walking: document.getElementById('avoid_high_walking').checked,
      }
    };

    try {
      const res = await fetch(`${API}/trips`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Error generating trip');
      currentTripId = data.trip_id;
      renderTrip(data);
    } catch(err) {
      document.getElementById('results').innerHTML = `<div class="error-bar active">❌ ${err.message}</div>`;
    } finally {
      btn.disabled = false; btn.textContent = '✦ Generate Itinerary';
    }
  });

  function renderTrip(data) {
    const locked = new Set(data.locked_slots || []);
    const slots = ['morning','afternoon','evening'];
    const emoji = {morning:'🌅',afternoon:'☀️',evening:'🌆'};
    let html = `
      <div class="trip-meta">
        <div class="meta-item"><span class="label">Days</span><span class="value">${data.days}</span></div>
        <div class="meta-item"><span class="label">Pace</span><span class="value">${data.pace}</span></div>
        <div class="meta-item"><span class="label">Est. Cost</span><span class="value">$${data.estimated_total_cost_nzd} NZD</span></div>
        <div class="meta-item"><span class="label">Budget</span><span class="value">$${data.budget_nzd} NZD</span></div>
        <span class="trip-id-badge">Trip #${data.trip_id}</span>
      </div>
    `;
    if ((data.warnings||[]).length>0) html += `<div class="warning-bar">⚠️ ${data.warnings.join(' ')}</div>`;

    for (let d=1; d<=data.days; d++) {
      const day = data.itinerary[`day_${d}`];
      if (!day) continue;
      html += `<div class="day-card" style="animation-delay:${(d-1)*0.1}s"><div class="day-header"><h3>Day ${d}</h3><span class="day-stats">${Math.round(day.day_minutes/60)}h planned · cap ${day.pace_cap_minutes/60}h</span></div><div class="slots">`;
      slots.forEach(slot => {
        const poi = day[slot]; if (!poi) return;
        const key = `day_${d}:${slot}`;
        const isLocked = locked.has(key);
        html += `
          <div class="slot ${isLocked?'locked':''}">
            ${isLocked?'<span class="lock-badge">🔒 locked</span>':''}
            <div class="slot-time">${emoji[slot]}<br/>${slot}</div>
            <div class="slot-content">
              <div class="slot-name">${poi.name}</div>
              <div class="slot-detail">⏱ ${poi.avgDurationMin} min &nbsp;·&nbsp; 💰 ${poi.costLevel} &nbsp;·&nbsp; 🚶 ${poi.walkingLevel}</div>
              <div class="slot-tags">${(poi.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
            </div>
            <div class="slot-actions">
              ${isLocked
                ?`<button class="action-btn gold" onclick="unlockSlot(${d},'${slot}')">🔓 Unlock</button>`
                :`<button class="action-btn gold" onclick="lockSlot(${d},'${slot}')">🔒 Lock</button>
                  <button class="action-btn" onclick="replaceSlot(${d},'${slot}')">🔄 Replace</button>`
              }
            </div>
          </div>`;
      });
      html += `</div><div class="day-footer"><button class="action-btn" onclick="rebuildDay(${d})">🔁 Rebuild Day ${d}</button></div></div>`;
    }
    document.getElementById('results').innerHTML = html;
  }

  async function lockSlot(day,slot) {
    if (!currentTripId) return;
    await fetch(`${API}/trips/${currentTripId}/lock-slot`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({day,slot})});
    await refreshTrip();
  }
  async function unlockSlot(day,slot) {
    if (!currentTripId) return;
    await fetch(`${API}/trips/${currentTripId}/unlock-slot`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({day,slot})});
    await refreshTrip();
  }
  async function replaceSlot(day,slot) {
    if (!currentTripId) return;
    const res = await fetch(`${API}/trips/${currentTripId}/replace`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({day,slot,preferences:{}})});
    renderTrip(await res.json());
  }
  async function rebuildDay(day) {
    if (!currentTripId) return;
    const res = await fetch(`${API}/trips/${currentTripId}/rebuild-day`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({day,force_change:true})});
    renderTrip(await res.json());
  }
  async function refreshTrip() {
    if (!currentTripId) return;
    const res = await fetch(`${API}/trips/${currentTripId}`);
    renderTrip(await res.json());
  }
</script>
